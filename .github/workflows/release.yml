name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: macos-14
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Swift 5.9
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build (${{ matrix.arch }})
        run: swift build -c release --arch ${{ matrix.arch }}

      - name: Verify binary
        run: |
          BINARY=".build/apple/Products/Release/Quota"
          if [[ ! -f "$BINARY" ]]; then
            BINARY=".build/apple/Products/release/Quota"
          fi
          if [[ ! -f "$BINARY" ]]; then
            BINARY=".build/release/Quota"
          fi
          file "$BINARY"
          lipo -info "$BINARY"

      - name: Create DMG
        env:
          DMG_SUFFIX: ${{ matrix.arch }}
        run: bash Scripts/package-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: .build/Quota-*.dmg
          include-hidden-files: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
